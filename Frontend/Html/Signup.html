<!DOCTYPE html>
<html lang="en">
<head>
    <title>SignUp</title>
</head>
<body>
    <form method="get">
        <h2>Sign Up</h2>
        <label for="name">First Name</label>
        <input type="text" id="firstName" name="name" required  placeholder="Enter your first name">
        <br>
        <br>

        <label for="name">Last Name</label>
        <input type="text" id="lastName" name="name" required  placeholder="Enter your last name">
        <br>
        <br>

        <label for="age">Age</label>
        <input type="number" id="age" name="age" required placeholder="Enter your age">
        <br>
        <br>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required  placeholder="Enter your username">
        <br>
        <br>

        <label for="">Email</label>
        <input type="email" id="email" name="email" required  placeholder="Enter your email">
        <br>
        <br>

        <label for="Password">Password</label>
        <input type="password" id="Password" name="Password" required placeholder="Enter your password">

        <br>
        <br>

         <p>please select your gender</p>
        <input type="radio" name="gender" id="male"  value="male" required>
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="female" required>
        <label for="female">female</label>
        <br>
        <br>

        <label >Courses </label>
        <select name="courses" id="courses" required>
            <option value="" disabled selected>Choose an option </option>
            <option value="mern">MERN  Stack</option>
            <option value="graphics"> Graphics Design</option>
            <option value="digtal">Digtal Marketing</option>
            <option value="video">Video Editing</option>
            <option value="programing">Programing</option>
        </select>
        <br>
        <br>

        <label for="">Country: </label>
        <select name="country" id="Country" required>
            <option value="" disabled selected>Choose your Nationalities </option>
            <option value="eth">Ethiopia</option>
            <option value="usa">United State</option>
            <option value="uk">United Kingdom</option>
            <option value="pl">Poland</option>
            <option value="ca">Canada</option>
            <option value="uea">UEA</option>
        </select>
        <br>
        <br>
        
        <p>Please select your hobby</p>
        <label for="sport">Sport</label>
        <input type="checkbox" id="sport" name="hobby" value="sport">

        <label for="art">Art</label>
        <input type="checkbox" id="art" name="hobby" value="art">

        <label for="music">Music</label>
        <input type="checkbox" id="music" name="hobby" value="music">
        
        <label for="gaming">Gaming</label>
        <input type="checkbox" id="gaming" name="hobby" value="gaming">
        <br>
        <br>
        <button type="submit">SignUp</button>
    </form>
</body>
</html>
